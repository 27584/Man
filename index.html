<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man!</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
        }
    }
    </script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    
    #title { 
        position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
        font-size: 64px; font-weight: bold; color: #fff; 
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); text-align: center; 
    }
    #subtitle { 
        position: absolute; top: 40%; left: 50%; transform: translateX(-50%); 
        font-size: 28px; color: #fff; 
        animation: blink 1s ease-in-out infinite; 
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); 
    }
    
    /* 主场景 HUD - 左下角，白字蓝边 */
    #hud {
        display: none;
        position: absolute;
        bottom: 20px;
        left: 20px;
        color: white;
        font-size: 18px;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px 20px;
        border-radius: 8px;
        font-family: monospace;
        pointer-events: none;
        backdrop-filter: blur(4px);
        border-left: 3px solid #00aaff;
    }
    
    /* 跑酷场景 HUD - 右下角，白色字体金边 */
    #run_hud {
        display: none;
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: white;
        font-size: 18px;
        background: rgba(0, 0, 0, 0.6);
        padding: 12px 20px;
        border-radius: 8px;
        font-family: monospace;
        letter-spacing: 1px;
        pointer-events: none;
        backdrop-filter: blur(4px);
        border-left: 3px solid #ffaa00;
    }
    
    /* 移动端 RUN 按钮 */
    #runButton {
        display: none;
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        color: white;
        border: none;
        padding: 16px 48px;
        font-size: 24px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 2px;
        pointer-events: auto;
        z-index: 1000;
    }
    
    #runButton:hover {
        transform: translateX(-50%) scale(1.05);
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
    }
    
    #runButton:active {
        transform: translateX(-50%) scale(0.95);
    }
    
    @keyframes blink { 
        0%, 100% { opacity: 1; } 
        50% { opacity: 0.3; } 
    }
</style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="title">Man!</div>
        <div id="subtitle">Loading...</div>
        <div id="hud">
            <div>Shift - 冲刺</div>
            <div>空格 - 跳跃</div>
            <div>WASD - 移动</div>
        </div>
        <button id="runButton">RUN</button>
        <div id="run_hud">
            <div>Shift - 冲刺</div>
            <div>S/↓ - 滑铲</div>
            <div>W/空格/↑ - 跳跃</div>
            <div>A/D/←/→ - 切换跑道</div>
        </div>
    </div>
    <!-- 排行榜按钮 -->
<button id="leaderboardBtn" style="
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  padding: 8px 16px;
  background: #222;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
">排行榜</button>

<!-- 排行榜弹窗 -->
<div id="leaderboardModal" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: #000;
  padding: 24px;
  border-radius: 8px;
  min-width: 300px;
  max-width: 400px;
  z-index: 10000;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h3 style="margin:0;">分数排行榜</h3>
    <button id="closeLeaderboard" style="border:none;background:none;font-size:20px;cursor:pointer;">×</button>
  </div>
  <div id="leaderboardContent">加载中...</div>
</div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
