<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man!（在线排行榜与安卓兼容已上线）</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
        }
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="title">Man!</div>
        <div id="subtitle">Loading...</div>
        <div id="hud" class="hud-container">
            <div>Shift - 冲刺</div>
            <div>空格 - 跳跃</div>
            <div>WASD - 移动</div>
        </div>
        <button id="runButton" class="game-button">RUN</button>
        <div id="run_hud" class="hud-container">
            <div>Shift - 冲刺</div>
            <div>S/↓ - 滑铲</div>
            <div>W/空格/↑ - 跳跃</div>
            <div>A/D/←/→ - 切换跑道</div>
        </div>
    </div>
    
    <!-- 排行榜按钮 -->
    <button id="leaderboardBtn">排行榜</button>

    <!-- 排行榜弹窗 -->
    <div id="leaderboardModal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3>分数排行榜</h3>
            <button id="closeLeaderboard">×</button>
        </div>
        <div id="leaderboardContent">加载中...</div>
    </div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
