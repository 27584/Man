<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Man!</title>
    <script type="importmap">
    {
        "imports": {
            "three": "./lib/three.module.js",
            "three/addons/": "./lib/",
            "three/addons/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js",
            "three/addons/postprocessing/EffectComposer.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
            "three/addons/postprocessing/RenderPass.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
            "three/addons/postprocessing/ShaderPass.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/ShaderPass.js",
            "three/addons/shaders/CopyShader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/shaders/CopyShader.js"
        }
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="title">Man!</div>
        <div id="subtitle">Loading...</div>
        <div id="version">v1.0.0</div>
        <div id="hud" class="hud-container">
        <div>Shift - 冲刺</div>
        <div>空格 - 跳跃</div>
        <div>WASD - 移动</div>
    </div>
    <button id="runButton" class="game-button">RUN</button>
    <div id="run_hud" class="hud-container">
        <div>Shift - 冲刺</div>
        <div>S/↓ - 滑铲</div>
        <div>W/空格/↑ - 跳跃</div>
        <div>A/D/←/→ - 切换跑道</div>
    </div>
    <div id="run_hud_mobile" class="hud-container">
        <div>左滑/右滑 - 切换跑道</div>
        <div>上滑 - 跳跃</div>
        <div>下滑 - 滑铲</div>
        <div>双击 - 冲刺</div>
    </div>
    </div>
    
    <!-- 功能按钮 -->
    <div id="actionButtons">
        <button id="uploadScoreBtn" class="action-btn">上传分数</button>
        <button id="leaderboardBtn" class="action-btn">排行榜</button>
        
        <button id="settingsBtn" class="action-btn" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
    </div>

    <!-- 设置面板 -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content settings-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3>设置</h3>
                <button id="closeSettings">×</button>
            </div>
            <div class="settings-section">
                <h4>画面风格</h4>
                <div id="styleSelector" class="style-grid"></div>
            </div>
            <div class="settings-section">
                <div class="settings-toggle">
                    <span>手势操控模式</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="gestureToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            <div class="settings-section">
                <h4>关于</h4>
                <div class="settings-links">
                    <button id="changelogBtn" class="settings-link-btn">更新日志</button>
                    <button id="githubBtn" class="settings-link-btn github-btn" title="GitHub">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 更新日志弹窗 -->
    <div id="changelogModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3>更新日志</h3>
                <button id="closeChangelog">×</button>
            </div>
            <div id="changelogContent">加载中...</div>
        </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div id="leaderboardModal">
        <div class="modal-header">
            <h3>分数排行榜</h3>
            <button id="closeLeaderboard">×</button>
        </div>
        <div class="leaderboard-tabs">
            <button id="tabLeaderboard" class="tab-btn active">排行榜</button>
            <button id="tabGod" class="tab-btn">神仙榜</button>
        </div>
        <div id="leaderboardLoading" class="leaderboard-loading">
            <div class="loading-spinner small"></div>
            <div class="loading-text">加载中...</div>
        </div>
        <div id="leaderboardContent">
            <table id="leaderboardTable" class="leaderboard-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>昵称</th>
                        <th>分数</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 自定义输入弹窗 -->
    <div id="nicknameModal" class="modal-overlay">
        <div class="modal-content">
            <h3>上传分数</h3>
            <input type="text" id="nicknameInput" placeholder="请输入你的昵称" maxlength="10">
            <div class="modal-buttons">
                <button id="submitNickname" class="modal-btn primary">确认</button>
                <button id="cancelNickname" class="modal-btn secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toastMessage" class="toast-message"></div>

    <!-- 跑酷场景加载 UI -->
    <div id="runGameLoading" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">牢大热身中...</div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- GAME OVER UI -->
    <div id="gameOverOverlay" class="gameover-overlay">
        <div class="gameover-content">
            <div class="gameover-title">Manba Out!</div>
            <div class="gameover-score-label">最终得分</div>
            <div class="gameover-score" id="gameOverScore">0</div>
            <div class="gameover-buttons">
                <button id="restartBtn" class="gameover-btn primary">重来</button>
                <button id="backToMenuBtn" class="gameover-btn secondary">返回主菜单</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
